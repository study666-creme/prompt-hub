  <script>
    window.__APP_BUILD__ = '20260707o';
    (function () {
      var key = 'promptrepo_app_build';
      var cur = window.__APP_BUILD__;
      var prev = localStorage.getItem(key);
      function purgeCachesAndSw() {
        var tasks = [];
        if ('caches' in window) {
          tasks.push(caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (k) {
              if (/prompt-hub-v/i.test(k)) return caches.delete(k);
            }));
          }));
        }
        if ('serviceWorker' in navigator) {
          tasks.push(navigator.serviceWorker.getRegistrations().then(function (regs) {
            return Promise.all(regs.map(function (r) { return r.unregister(); }));
          }));
        }
        return Promise.all(tasks);
      }
      if (prev && prev !== cur) {
        localStorage.setItem(key, cur);
        try { localStorage.removeItem('ph_missing_paths_v1'); } catch (e) { /* ignore */ }
        var onceKey = 'promptrepo_build_reload_once_' + cur;
        if (sessionStorage.getItem(onceKey)) return;
        sessionStorage.setItem(onceKey, '1');
        purgeCachesAndSw().finally(function () { location.reload(); });
        return;
      }
      if (!prev) localStorage.setItem(key, cur);
    })();
  </script>

      for (var i = 0; i < parts.length; i += 1) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', parts[i] + '?v=' + version, false);
        xhr.send(null);
        if (!((xhr.status >= 200 && xhr.status < 300) || (xhr.status === 0 && xhr.responseText))) {
          throw new Error('Prompt Hub index body partial failed to load: ' + parts[i] + ' (' + xhr.status + ')');
        }
        html += xhr.responseText;
      }
      var script = document.currentScript;
      if (script && script.parentNode) {
        script.insertAdjacentHTML('beforebegin', html);
        script.parentNode.removeChild(script);
      } else {
        document.body.insertAdjacentHTML('afterbegin', html);
      }
    })();
  </script>

      var FALLBACK = [

        { id: 'gpt-image-2', label: 'GPT Image 2' },
        { id: 'apimart-gpt-image-2-official-budget', label: 'GPT Image 2 · 特价' },

        { id: 'apimart-gemini-2-5-flash-preview', label: 'Nano Banana Fast' },
        { id: 'apimart-gemini-3-1-flash-preview', label: 'Nano Banana 2' },
        { id: 'apimart-gemini-3-pro-preview', label: 'Nano Banana Pro' },
        { id: 'apimart-wan2-7-image', label: '万相 2.7' },
        { id: 'apimart-wan2-7-image-pro', label: '万相 2.7 Pro' },
        { id: 'apimart-flux-kontext-pro', label: 'Flux Kontext Pro' },
        { id: 'apimart-flux-kontext-max', label: 'Flux Kontext Max' },
        { id: 'apimart-flux-2-pro', label: 'Flux 2 Pro' },
        { id: 'apimart-flux-2-flex', label: 'Flux 2 Flex' }
      ];
      function paint(sel, models) {
        if (!sel || !models || !models.length) return;
        sel.disabled = false;
        sel.removeAttribute('aria-busy');
        sel.innerHTML = '';
        models.forEach(function (m) {
          var opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.label || m.catalogLabel || m.id;
          sel.appendChild(opt);
        });
      }
      function readCache() {
        try {
          var raw = JSON.parse(localStorage.getItem('promptrepo_imagegen_models_cache_v3') || 'null');
          if (!raw || !raw.models || !raw.models.length) return null;
          if (raw.ts < Date.now() - 86400000) return null;
          if (Number(raw.version) < 5) return null;
          return raw.models;
        } catch (e) { return null; }
      }
      document.addEventListener('DOMContentLoaded', function () {
        var sel = document.getElementById('imageGenModel');
        if (!sel) return;
        var models = readCache() || FALLBACK;
        paint(sel, models);
      });
    })();
  </script>
