name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
      - name: Install frontend tooling
        run: npm ci
      - name: Verify frontend and documentation
        run: npm run check:predeploy
      - name: Install Worker dependencies
        working-directory: server
        run: npm ci
      - name: Typecheck Worker
        working-directory: server
        run: npm run typecheck
      - name: Test Worker
        working-directory: server
        run: npm test
