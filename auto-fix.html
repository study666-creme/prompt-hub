<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一键诊断与修复工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { color: #4ade80; margin-bottom: 10px; }
    .subtitle { color: #888; margin-bottom: 30px; }
    .section { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .section h2 { color: #60a5fa; margin-bottom: 15px; font-size: 18px; }
    .btn { background: #4ade80; color: #000; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; margin: 5px; transition: all 0.2s; }
    .btn:hover { background: #22c55e; transform: translateY(-1px); }
    .btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }
    .btn-secondary { background: #374151; color: #e0e0e0; }
    .btn-secondary:hover { background: #4b5563; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .result { background: #0a0a0a; border: 1px solid #333; border-radius: 6px; padding: 15px; margin-top: 15px; font-family: 'Courier New', monospace; font-size: 13px; max-height: 300px; overflow-y: auto; }
    .result.success { border-color: #22c55e; }
    .result.error { border-color: #ef4444; }
    .result.warning { border-color: #f59e0b; }
    .status { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 600; margin-left: 10px; }
    .status.ok { background: #22c55e; color: #000; }
    .status.fail { background: #ef4444; color: #fff; }
    .status.warn { background: #f59e0b; color: #000; }
    .progress { background: #333; height: 4px; border-radius: 2px; overflow: hidden; margin-top: 10px; }
    .progress-bar { background: #4ade80; height: 100%; width: 0%; transition: width 0.3s; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
    pre { white-space: pre-wrap; word-wrap: break-word; }
    .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid #333; border-top-color: #4ade80; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 一键诊断与修复工具</h1>
    <p class="subtitle">自动检测并修复常见问题 · 适用于提示词仓库项目</p>
    <p class="subtitle" style="margin-top:-18px;color:#f59e0b">若看到「暂时无法连接」：先点下方「清除 Service Worker」，再打开主站。</p>

    <div class="section">
      <h2>打开主站</h2>
      <div class="grid">
        <a class="btn" href="https://prompt-hub.cn" target="_blank" rel="noopener">线上 prompt-hub.cn</a>
        <a class="btn btn-secondary" href="http://127.0.0.1:5500/" target="_blank" rel="noopener">本机 http://127.0.0.1:5500</a>
      </div>
      <p style="margin-top:12px;font-size:13px;color:#888">本机需先运行 <code>.\serve-local.ps1</code>；不要用 file:// 双击 index.html。</p>
    </div>

    <div class="section">
      <h2>快速操作</h2>
      <div class="grid">
        <button class="btn" onclick="runFullDiagnosis()">🔍 完整诊断</button>
        <button class="btn" onclick="fixAllIssues()">🛠️ 一键修复</button>
        <button class="btn btn-secondary" onclick="refreshImages()">🖼️ 刷新图片</button>
        <button class="btn btn-secondary" onclick="fixLayout()">📐 修复布局</button>
        <button class="btn btn-secondary" onclick="clearCaches()">🗑️ 清除缓存</button>
        <button class="btn btn-danger" onclick="emergencyRestore()">🚨 紧急恢复</button>
      </div>
    </div>

    <div class="section">
      <h2>诊断结果</h2>
      <div id="diagnosis"></div>
    </div>

    <div class="section">
      <h2>修复日志</h2>
      <div id="fixLog"></div>
    </div>

    <div class="section">
      <h2>系统信息</h2>
      <div id="sysInfo"></div>
    </div>
  </div>

  <script>
    let diagnosisResults = {};

    function log(msg, type = 'info') {
      const el = document.getElementById('fixLog');
      const time = new Date().toLocaleTimeString('zh-CN');
      const color = { info: '#60a5fa', success: '#22c55e', error: '#ef4444', warning: '#f59e0b' }[type] || '#888';
      el.innerHTML += `<div style="color: ${color}; margin: 5px 0;">[${time}] ${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    async function runFullDiagnosis() {
      const el = document.getElementById('diagnosis');
      el.innerHTML = '<div class="loading"></div> 诊断中...';
      log('开始完整诊断...', 'info');

      const checks = [
        { name: '修复补丁', fn: checkHotfix },
        { name: '图片加载', fn: checkImages },
        { name: '布局状态', fn: checkLayout },
        { name: '数据完整性', fn: checkData },
        { name: '云同步', fn: checkSync },
        { name: '性能指标', fn: checkPerformance }
      ];

      let html = '';
      for (const check of checks) {
        try {
          const result = await check.fn();
          diagnosisResults[check.name] = result;
          const status = result.ok ? 'ok' : (result.warning ? 'warn' : 'fail');
          const statusText = result.ok ? '正常' : (result.warning ? '警告' : '异常');
          html += `<div style="margin: 10px 0;"><strong>${check.name}</strong><span class="status ${status}">${statusText}</span><br><small style="color: #888;">${result.message}</small></div>`;
        } catch (e) {
          html += `<div style="margin: 10px 0;"><strong>${check.name}</strong><span class="status fail">错误</span><br><small style="color: #ef4444;">${e.message}</small></div>`;
        }
      }

      el.innerHTML = html;
      log('诊断完成', 'success');
    }

    function checkHotfix() {
      const hasForceRefresh = typeof window.opener?.forceRefreshAllImages === 'function';
      const hasDataSafety = typeof window.opener?.DataSafety === 'object';
      const hasPerf = typeof window.opener?.queueImagePreload === 'function';
      
      if (hasForceRefresh && hasDataSafety && hasPerf) {
        return { ok: true, message: '所有修复补丁已加载' };
      }
      return { ok: false, message: '部分补丁未加载，请刷新主页面' };
    }

    function checkImages() {
      if (!window.opener) return { ok: false, message: '请从主页面打开此工具' };
      
      const imgs = window.opener.document.querySelectorAll('img[data-image-ref]');
      const loaded = Array.from(imgs).filter(img => img.complete && img.naturalWidth > 0);
      const percent = imgs.length ? Math.round(loaded.length / imgs.length * 100) : 100;
      
      if (percent >= 80) {
        return { ok: true, message: `${loaded.length}/${imgs.length} 张图片已加载 (${percent}%)` };
      } else if (percent >= 50) {
        return { ok: false, warning: true, message: `仅 ${percent}% 图片已加载，建议刷新` };
      }
      return { ok: false, message: `仅 ${percent}% 图片已加载，需要修复` };
    }

    function checkLayout() {
      if (!window.opener) return { ok: false, message: '请从主页面打开此工具' };
      
      const container = window.opener.document.getElementById('cardsContainer');
      if (!container) return { ok: false, message: '未找到卡片容器' };
      
      const cards = container.querySelectorAll('.card');
      const overlapping = Array.from(cards).some((card, i, arr) => {
        if (i === 0) return false;
        const rect1 = card.getBoundingClientRect();
        const rect2 = arr[i-1].getBoundingClientRect();
        return rect1.top < rect2.bottom - 10;
      });
      
      if (overlapping) {
        return { ok: false, message: '检测到卡片重叠，需要重新布局' };
      }
      return { ok: true, message: '布局正常' };
    }

    function checkData() {
      if (!window.opener) return { ok: false, message: '请从主页面打开此工具' };
      
      const cards = window.opener.cards || [];
      const groups = window.opener.customGroups || [];
      
      if (cards.length === 0) {
        return { ok: false, warning: true, message: '卡片库为空' };
      }
      
      const duplicateIds = cards.map(c => c.id).filter((id, i, arr) => arr.indexOf(id) !== i);
      if (duplicateIds.length > 0) {
        return { ok: false, message: `发现 ${duplicateIds.length} 个重复 ID` };
      }
      
      return { ok: true, message: `${cards.length} 张卡片，${groups.length} 个分组` };
    }

    function checkSync() {
      if (!window.opener) return { ok: false, message: '请从主页面打开此工具' };
      
      const isLoggedIn = window.opener.SupabaseSync?.isLoggedIn?.();
      if (!isLoggedIn) {
        return { ok: false, warning: true, message: '未登录，无法云同步' };
      }
      
      return { ok: true, message: '已登录，云同步可用' };
    }

    function checkPerformance() {
      if (!performance.memory) {
        return { ok: true, warning: true, message: '浏览器不支持内存监控' };
      }
      
      const used = performance.memory.usedJSHeapSize / 1024 / 1024;
      const total = performance.memory.totalJSHeapSize / 1024 / 1024;
      
      if (used > 200) {
        return { ok: false, message: `内存占用过高: ${used.toFixed(0)}MB / ${total.toFixed(0)}MB` };
      } else if (used > 150) {
        return { ok: false, warning: true, message: `内存占用较高: ${used.toFixed(0)}MB / ${total.toFixed(0)}MB` };
      }
      
      return { ok: true, message: `内存占用正常: ${used.toFixed(0)}MB / ${total.toFixed(0)}MB` };
    }

    async function fixAllIssues() {
      log('开始自动修复...', 'info');
      
      if (!window.opener) {
        log('错误：请从主页面打开此工具', 'error');
        return;
      }
      
      let fixed = 0;
      
      // 1. 刷新图片
      if (diagnosisResults['图片加载']?.ok === false) {
        log('修复图片加载...', 'info');
        await refreshImages();
        fixed++;
      }
      
      // 2. 修复布局
      if (diagnosisResults['布局状态']?.ok === false) {
        log('修复布局...', 'info');
        await fixLayout();
        fixed++;
      }
      
      // 3. 清理内存
      if (diagnosisResults['性能指标']?.ok === false) {
        log('清理缓存...', 'info');
        await clearCaches();
        fixed++;
      }
      
      if (fixed === 0) {
        log('未发现需要修复的问题', 'success');
      } else {
        log(`已修复 ${fixed} 个问题`, 'success');
        setTimeout(() => runFullDiagnosis(), 1000);
      }
    }

    async function refreshImages() {
      if (!window.opener) {
        log('错误：请从主页面打开此工具', 'error');
        return;
      }
      
      log('正在刷新图片...', 'info');
      
      if (typeof window.opener.forceRefreshAllImages === 'function') {
        window.opener.forceRefreshAllImages();
        log('图片刷新完成', 'success');
      } else {
        log('未找到刷新函数，请确认修复补丁已加载', 'error');
      }
    }

    async function fixLayout() {
      if (!window.opener) {
        log('错误：请从主页面打开此工具', 'error');
        return;
      }
      
      log('正在修复布局...', 'info');
      
      const isMobile = window.opener.matchMedia('(max-width: 900px)').matches;
      
      if (isMobile && typeof window.opener.enforceMobileCardGrid === 'function') {
        window.opener.enforceMobileCardGrid();
        log('移动端布局已修复', 'success');
      } else if (typeof window.opener.layoutMasonryGrid === 'function') {
        window.opener.layoutMasonryGrid();
        log('桌面端布局已修复', 'success');
      } else {
        log('未找到布局函数', 'error');
      }
    }

    async function clearCaches() {
      log('正在清除缓存...', 'info');

      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const reg of regs) await reg.unregister();
        log(`已注销 ${regs.length} 个 Service Worker`, 'success');
      }

      if ('caches' in window) {
        const keys = await caches.keys();
        for (const key of keys) await caches.delete(key);
        log(`已清除 ${keys.length} 个缓存桶`, 'success');
      }

      if (window.opener?.SupabaseSync?.clearSignedUrlCache) {
        window.opener.SupabaseSync.clearSignedUrlCache();
        log('主页面图片签名缓存已清除', 'success');
      }

      log('请硬刷新主站 (Ctrl+Shift+R)', 'info');
    }

    async function emergencyRestore() {
      if (!window.opener) {
        log('错误：请从主页面打开此工具', 'error');
        return;
      }
      
      if (!confirm('确定要从最近的恢复点恢复数据吗？当前数据将被覆盖。')) {
        return;
      }
      
      log('正在恢复数据...', 'warning');
      
      if (typeof window.opener.DataSafety?.listRecoveryPoints === 'function') {
        const points = window.opener.DataSafety.listRecoveryPoints();
        
        if (points.length === 0) {
          log('未找到恢复点', 'error');
          return;
        }
        
        try {
          await window.opener.DataSafety.restoreFromRecoveryPoint(points[0].key);
          log('数据恢复成功，请刷新页面', 'success');
          
          if (confirm('数据已恢复，是否立即刷新页面？')) {
            window.opener.location.reload();
          }
        } catch (e) {
          log('恢复失败: ' + e.message, 'error');
        }
      } else {
        log('未找到恢复功能', 'error');
      }
    }

    function showSysInfo() {
      const el = document.getElementById('sysInfo');
      
      const info = {
        '浏览器': navigator.userAgent.split(' ').pop(),
        '视口': `${window.innerWidth} × ${window.innerHeight}`,
        '设备像素比': window.devicePixelRatio,
        '在线状态': navigator.onLine ? '在线' : '离线',
        '语言': navigator.language,
        '平台': navigator.platform
      };
      
      if (performance.memory) {
        info['内存使用'] = `${(performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(0)} MB`;
        info['内存限制'] = `${(performance.memory.jsHeapSizeLimit / 1024 / 1024).toFixed(0)} MB`;
      }
      
      let html = '<div class="result">';
      for (const [key, value] of Object.entries(info)) {
        html += `<div style="margin: 5px 0;"><strong>${key}:</strong> ${value}</div>`;
      }
      html += '</div>';
      
      el.innerHTML = html;
    }

    // 初始化
    window.addEventListener('load', () => {
      showSysInfo();
      log('工具已就绪', 'success');
      log('当前地址: ' + location.href, 'info');
      if (!window.opener) {
        log('可独立使用：点「清除缓存」后打开上方主站链接', 'warning');
      }
    });
  </script>
</body>
</html>
