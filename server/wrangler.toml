name = "prompt-hub-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
CORS_ORIGINS = "http://localhost:8788,http://127.0.0.1:8788,http://localhost:5500"

# 敏感项请用 wrangler secret put：
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# SUPABASE_JWT_SECRET（可选，用于本地 JWT 校验加速）

[observability]
enabled = true
