name = "prompt-hub-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
CORS_ORIGINS = "https://prompt-hubs.com,https://www.prompt-hubs.com,https://canvas.prompt-hubs.com,https://prompt-hub.cn,https://www.prompt-hub.cn,https://prompt-hub-hub.pages.dev,https://prompt-hub-web.pages.dev"
CHAT_API_BASE_URL = "https://api.deepseek.com"
CHAT_MODEL = "deepseek-chat"
NEWAPI_API_BASE_URL = "https://newapi.prompt-hubs.com"
REVERSE_VISION_MODEL = "gemini-2.5-flash-lite"
FISSION_VISION_MODEL = "gemini-2.5-flash"
FISSION_CHAT_MODEL = "deepseek-v4-pro"
MEDIA_STORAGE_MODE = "r2-first"

# 敏感项请用 wrangler secret put：
# SUPABASE_URL（prompt-hubs.com 路线：填境外 https://xxxxx.supabase.co，见 docs/OVERSEAS-FIRST.md）
# 旧 prompt-hub.cn + 阿里云 RDS：http://sb.prompt-hub.cn（灰云 DNS，勿裸 IP，见 docs/SUPABASE-PROXY-SETUP.md）
# SUPABASE_SERVICE_ROLE_KEY
# SUPABASE_JWT_SECRET（可选，用于本地 JWT 校验加速）
# IMAGE_API_KEY（生图 · GrsAI 主上游）
# APIMART_API_KEY（生图 · Apimart 备用）
# CHAT_API_KEY（对话 · DeepSeek 官方 API Key）
# ADMIN_API_SECRET（运营批量造激活码，见 scripts/generate-codes.ps1）

# 图片桶（先在 Cloudflare R2 控制台创建 prompt-hub-card-images，见 docs/R2-MIGRATION.md）
[[r2_buckets]]
binding = "CARD_IMAGES_R2"
bucket_name = "prompt-hub-card-images"
preview_bucket_name = "prompt-hub-card-images-dev"

[[kv_namespaces]]
binding = "PROMPT_HUB_METRICS"
id = "37976970d22347fba80ca6c72238f6e7"
preview_id = "c2602858d4bd40a4b1603de6d7b4af22"

[[routes]]
pattern = "api.prompt-hubs.com"
custom_domain = true

[[routes]]
pattern = "api.prompt-hub.cn"
custom_domain = true

[observability]
enabled = true
