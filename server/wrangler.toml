name = "prompt-hub-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
CORS_ORIGINS = "https://prompt-hub-hub.pages.dev,https://prompt-hub-web.pages.dev"

# 敏感项请用 wrangler secret put：
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# SUPABASE_JWT_SECRET（可选，用于本地 JWT 校验加速）
# ADMIN_API_SECRET（运营批量造激活码，见 scripts/generate-codes.ps1）

[observability]
enabled = true
